<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="nodeGradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Network connections (lines) -->
  <g stroke="url(#nodeGradient1)" stroke-width="2" opacity="0.6">
    <!-- Layer 1 to Layer 2 connections -->
    <line x1="180" y1="80" x2="240" y2="70" />
    <line x1="180" y1="80" x2="240" y2="120" />
    <line x1="180" y1="80" x2="240" y2="170" />
    
    <line x1="180" y1="150" x2="240" y2="70" />
    <line x1="180" y1="150" x2="240" y2="120" />
    <line x1="180" y1="150" x2="240" y2="170" />
    
    <line x1="180" y1="220" x2="240" y2="70" />
    <line x1="180" y1="220" x2="240" y2="120" />
    <line x1="180" y1="220" x2="240" y2="170" />
    
    <!-- Layer 2 to Layer 3 connections -->
    <line x1="240" y1="70" x2="300" y2="95" />
    <line x1="240" y1="70" x2="300" y2="145" />
    <line x1="240" y1="70" x2="300" y2="195" />
    
    <line x1="240" y1="120" x2="300" y2="95" />
    <line x1="240" y1="120" x2="300" y2="145" />
    <line x1="240" y1="120" x2="300" y2="195" />
    
    <line x1="240" y1="170" x2="300" y2="95" />
    <line x1="240" y1="170" x2="300" y2="145" />
    <line x1="240" y1="170" x2="300" y2="195" />
    
    <!-- Layer 3 to Layer 4 connections -->
    <line x1="300" y1="95" x2="360" y2="80" />
    <line x1="300" y1="95" x2="360" y2="130" />
    <line x1="300" y1="95" x2="360" y2="180" />
    
    <line x1="300" y1="145" x2="360" y2="80" />
    <line x1="300" y1="145" x2="360" y2="130" />
    <line x1="300" y1="145" x2="360" y2="180" />
    
    <line x1="300" y1="195" x2="360" y2="130" />
    <line x1="300" y1="195" x2="360" y2="180" />
    
    <!-- Layer 4 to Layer 5 connections -->
    <line x1="360" y1="80" x2="420" y2="100" />
    <line x1="360" y1="80" x2="420" y2="160" />
    
    <line x1="360" y1="130" x2="420" y2="100" />
    <line x1="360" y1="130" x2="420" y2="160" />
    
    <line x1="360" y1="180" x2="420" y2="100" />
    <line x1="360" y1="180" x2="420" y2="160" />
    <line x1="360" y1="180" x2="420" y2="210" />
  </g>
  
  <!-- Network nodes (circles) -->
  <g filter="url(#glow)">
    <!-- Layer 1 (Purple) -->
    <circle cx="180" cy="80" r="10" fill="#a855f7" />
    <circle cx="180" cy="150" r="10" fill="#a855f7" />
    <circle cx="180" cy="220" r="10" fill="#a855f7" />
    
    <!-- Layer 2 (Purple-Blue) -->
    <circle cx="240" cy="70" r="10" fill="#9333ea" />
    <circle cx="240" cy="120" r="10" fill="#8b5cf6" />
    <circle cx="240" cy="170" r="10" fill="#7c3aed" />
    
    <!-- Layer 3 (Blue) -->
    <circle cx="300" cy="95" r="10" fill="#6366f1" />
    <circle cx="300" cy="145" r="10" fill="#6366f1" />
    <circle cx="300" cy="195" r="10" fill="#6366f1" />
    
    <!-- Layer 4 (Blue-Cyan) -->
    <circle cx="360" cy="80" r="10" fill="#3b82f6" />
    <circle cx="360" cy="130" r="10" fill="#2dd4bf" />
    <circle cx="360" cy="180" r="10" fill="#22d3ee" />
    
    <!-- Layer 5 (Cyan) -->
    <circle cx="420" cy="100" r="10" fill="#06b6d4" />
    <circle cx="420" cy="160" r="10" fill="#06b6d4" />
    <circle cx="420" cy="210" r="10" fill="#06b6d4" />
  </g>
  
  <!-- Text -->
  <text x="300" y="310" font-family="Arial, sans-serif" font-size="72" font-weight="700" text-anchor="middle" fill="url(#textGradient)">
    L5A<tspan fill="#06b6d4">.</tspan><tspan fill="#06b6d4">IO</tspan>
  </text>
</svg>